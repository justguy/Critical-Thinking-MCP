<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="description" content="CT-MCP Beta 2 showcase: curated release-gate examples, scorecard, and a browsable benchmark bundle." />
<title>Critical Thinking MCP — Beta 2 Showcase</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="src/styles.css" />
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="src/curated.js?v=1745036400"></script>
<script type="text/babel" src="src/data.jsx?v=1745036400"></script>
<script type="text/babel" src="src/components.jsx?v=1745036400"></script>

<script type="text/babel">
const { useState, useEffect, useMemo } = React;

const DEFAULTS = /*EDITMODE-BEGIN*/{
  "theme": "light",
  "accent": "signal"
}/*EDITMODE-END*/;

function App() {
  const cases = window.CURATED_CASES || [];
  const tracks = useMemo(() => ([
    { id: 'wins',    label: 'CT wins',           sub: 'where CT caught failures and forced a better answer', accent: 'win',     cases: cases.filter((c) => c.track === 'win') },
    { id: 'neutral', label: "Where CT didn't help", sub: 'cases where the model was already correct',        accent: 'neutral', cases: cases.filter((c) => c.track === 'neutral') },
  ]), [cases]);

  const [settings, setSettings] = useState(() => {
    try { const s = localStorage.getItem('ct_settings'); if (s) return { ...DEFAULTS, ...JSON.parse(s) }; } catch {}
    return DEFAULTS;
  });
  const [tweaksOpen, setTweaksOpen] = useState(false);
  const [currentId, setCurrentId] = useState(() => {
    try { return localStorage.getItem('ct_case') || cases[0]?.id; } catch { return cases[0]?.id; }
  });

  useEffect(() => {
    const onMsg = (e) => {
      if (!e.data || typeof e.data !== 'object') return;
      if (e.data.type === '__activate_edit_mode') setTweaksOpen(true);
      if (e.data.type === '__deactivate_edit_mode') setTweaksOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  useEffect(() => {
    try { localStorage.setItem('ct_settings', JSON.stringify(settings)); } catch {}
    document.documentElement.setAttribute('data-theme', settings.theme || 'light');
    document.documentElement.setAttribute('data-accent', settings.accent || 'cobalt');
  }, [settings]);

  useEffect(() => {
    try { if (currentId) localStorage.setItem('ct_case', currentId); } catch {}
  }, [currentId]);

  const activeCase = cases.find((c) => c.id === currentId) || cases[0];

  const change = (patch) => {
    setSettings((s) => ({ ...s, ...patch }));
    try { window.parent.postMessage({ type: '__edit_mode_set_keys', edits: patch }, '*'); } catch {}
  };

  const jumpToCase = (id) => {
    setCurrentId(id);
    requestAnimationFrame(() => {
      const el = document.getElementById('case-view');
      if (el) {
        // account for sticky navigator (~140px incl buffer)
        const y = el.getBoundingClientRect().top + window.scrollY - 160;
        window.scrollTo({ top: y, behavior: 'smooth' });
      }
    });
  };

  return (
    <div className="shell">
      <header className="topbar">
        <div className="topbar-brand">
          <span className="brand-dot" />
          <span className="brand-name">Critical&nbsp;Thinking&nbsp;MCP</span>
          <span className="brand-meta">Beta&nbsp;2 · benchmark</span>
        </div>
        <div className="topbar-meta">
          <span className="mono">2026‑04‑10</span>
          <span>·</span>
          <span>8 curated cases</span>
          <div className="theme-toggle" role="group" aria-label="Theme">
            <button
              className={`theme-btn ${settings.theme === 'light' ? 'is-on' : ''}`}
              onClick={() => change({ theme: 'light' })}
              aria-label="Light theme"
              aria-pressed={settings.theme === 'light'}
              title="Light"
            >
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
            </button>
            <button
              className={`theme-btn ${settings.theme === 'dark' ? 'is-on' : ''}`}
              onClick={() => change({ theme: 'dark' })}
              aria-label="Dark theme"
              aria-pressed={settings.theme === 'dark'}
              title="Dark"
            >
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" aria-hidden="true"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg>
            </button>
          </div>
          <button className="topbar-btn" onClick={() => setTweaksOpen((v) => !v)}>
            {tweaksOpen ? 'Close tweaks' : 'Tweaks'}
          </button>
        </div>
      </header>

      <Hero cases={cases} featured={activeCase} onPickCase={jumpToCase} />

      <Scorecard data={window.SCORECARD} onPickCase={jumpToCase} />

      <Navigator tracks={tracks} currentId={activeCase?.id} onPick={jumpToCase} />

      <div id="case-view">
        <div key={activeCase?.id || 'none'} className="beats-fade">
          <CaseView caseData={activeCase} />
        </div>
      </div>

      <FullBenchmark />

      <footer className="footer">
        <p>
          The complete benchmark (all prompts × models, routed tool outputs, and release decisions)
          is loaded from <Mono>runs.json</Mono> so the published surface stays aligned with the sanitized bundle.
          These eight cases are hand‑picked to show where CT earns its keep — and where it doesn't.
        </p>
      </footer>

      <TweaksPanel open={tweaksOpen} settings={settings} onChange={change} onClose={() => setTweaksOpen(false)} />
    </div>
  );
}

const Mono = ({ children }) => <span className="mono">{children}</span>;

try {
  const root = ReactDOM.createRoot(document.getElementById('root'));
  root.render(<App />);
} catch (e) {
  document.getElementById('root').innerText = 'Render error: ' + e.message;
  console.error(e);
}
</script>
</body>
</html>
